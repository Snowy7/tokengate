# Triggered on: every push to main + every pull request
name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Run package tests
        run: bun test packages

      - name: Typecheck Convex
        run: bunx tsc --noEmit -p packages/convex/tsconfig.json

      - name: Typecheck CLI
        run: bunx tsc --noEmit -p apps/cli/tsconfig.json

      - name: Build CLI
        run: cd apps/cli && bun run build

  deploy-convex:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Deploy Convex
        working-directory: packages/convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy
